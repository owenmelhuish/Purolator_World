<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PUSH + STRATIS × Purolator — Partnership Globe</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app"></div>

  <!-- UI overlay -->
  <div id="ui">
    <div id="brand">
      <div class="brand-mark">
        <img class="brand-logo" src="/logos/purolator.png" alt="Purolator" />
      </div>
      <div class="brand-sub">PUSH + STRATIS — One Bigger Purolator</div>
    </div>

    <div id="hint">Drag to spin &nbsp;·&nbsp; Right-drag to pan &nbsp;·&nbsp; Scroll to zoom &nbsp;·&nbsp; Click a pin</div>

    <div id="info-card" class="hidden">
      <button id="info-close" aria-label="Close">&times;</button>
      <div id="info-step" class="info-step"></div>
      <h2 id="info-title"></h2>
      <p id="info-body"></p>
      <div id="info-stats"></div>
    </div>

    <div id="tour-bar">
      <button id="tour-prev" class="tour-btn" aria-label="Previous stop">&#8592;</button>
      <button id="tour-start" class="tour-start">Start the story</button>
      <div id="tour-dots"></div>
      <button id="tour-next" class="tour-btn" aria-label="Next stop">&#8594;</button>
      <button id="tour-overview" class="tour-btn wide">Overview</button>
      <button id="walk-btn">&#128694; Walk the world</button>
    </div>

    <div id="lift-hud"></div>

    <div id="walk-hud">
      <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span>
      <span class="hud-sep">walk</span>
      <span class="key wide">Shift</span><span class="hud-sep">run</span>
      <span class="key wide">Space</span><span class="hud-sep">jump</span>
      <span class="hud-sep">&middot;&nbsp; mouse to look &nbsp;&middot;</span>
      <span class="key wide">Esc</span><span class="hud-sep">return to orbit</span>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
